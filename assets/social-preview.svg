    <text x="-180" y="5" text-anchor="middle" font-family="'Inter', sans-serif" font-size="13" fill="#888">Next.js 16</text>

    <rect x="-105" y="-18" width="100" height="36" rx="18" fill="none" stroke="#333" stroke-width="1"/>
    <text x="-55" y="5" text-anchor="middle" font-family="'Inter', sans-serif" font-size="13" fill="#888">Supabase</text>

    <rect x="10" y="-18" width="90" height="36" rx="18" fill="none" stroke="#333" stroke-width="1"/>
    <text x="55" y="5" text-anchor="middle" font-family="'Inter', sans-serif" font-size="13" fill="#888">Qdrant</text>

    <rect x="115" y="-18" width="130" height="36" rx="18" fill="none" stroke="#333" stroke-width="1"/>
    <text x="180" y="5" text-anchor="middle" font-family="'Inter', sans-serif" font-size="13" fill="#888">Transformers.js</text>
  </g>

  <!-- Feature tags -->
  <g transform="translate(640, 440)" font-family="'Inter', sans-serif" font-size="14" fill="#666" text-anchor="middle">
    <text x="-270" y="0">🔍 Semantic Search</text>
    <text x="-90" y="0">📚 Bookmark Folders</text>
    <text x="90" y="0">🤖 AI Guidance Engine</text>
    <text x="270" y="0">📄 Document Templates</text>

    <text x="-270" y="30">🌍 9 Languages</text>
    <text x="-90" y="30">🔐 AES-256-GCM Encryption</text>
    <text x="90" y="30">⚖️ RVG/GKG Fee Calculator</text>
    <text x="270" y="30">🛡️ RLS + CSP</text>
  </g>

  <!-- Bottom divider -->
  <line x1="200" y1="530" x2="1080" y2="530" stroke="#c9a84c" stroke-width="0.5" opacity="0.3"/>

  <!-- Footer -->
  <text x="640" y="575" text-anchor="middle" font-family="'Inter', sans-serif" font-size="13" fill="#555" letter-spacing="1">
    ai-assisted-german-law-shahriarhaqueabir.vercel.app
  </text>

  <!-- License badge -->
  <text x="640" y="605" text-anchor="middle" font-family="'Inter', sans-serif" font-size="11" fill="#444">
    Apache 2.0 License
  </text>
