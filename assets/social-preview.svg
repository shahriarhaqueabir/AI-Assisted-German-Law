    <line x1="0" y1="160" x2="1280" y2="160" stroke="#c9a84c" stroke-width="0.5"/>
    <line x1="0" y1="240" x2="1280" y2="240" stroke="#c9a84c" stroke-width="0.5"/>
    <line x1="0" y1="320" x2="1280" y2="320" stroke="#c9a84c" stroke-width="0.5"/>
    <line x1="0" y1="400" x2="1280" y2="400" stroke="#c9a84c" stroke-width="0.5"/>
    <line x1="0" y1="480" x2="1280" y2="480" stroke="#c9a84c" stroke-width="0.5"/>
    <line x1="0" y1="560" x2="1280" y2="560" stroke="#c9a84c" stroke-width="0.5"/>
    <line x1="160" y1="0" x2="160" y2="640" stroke="#c9a84c" stroke-width="0.5"/>
    <line x1="320" y1="0" x2="320" y2="640" stroke="#c9a84c" stroke-width="0.5"/>
    <line x1="480" y1="0" x2="480" y2="640" stroke="#c9a84c" stroke-width="0.5"/>
    <line x1="640" y1="0" x2="640" y2="640" stroke="#c9a84c" stroke-width="0.5"/>
    <line x1="800" y1="0" x2="800" y2="640" stroke="#c9a84c" stroke-width="0.5"/>
    <line x1="960" y1="0" x2="960" y2="640" stroke="#c9a84c" stroke-width="0.5"/>
    <line x1="1120" y1="0" x2="1120" y2="640" stroke="#c9a84c" stroke-width="0.5"/>
  </g>

  <!-- Accent glow -->
  <ellipse cx="640" cy="200" rx="500" ry="250" fill="url(#glow)"/>

  <!-- Decorative scale icon (left) -->
  <g transform="translate(90, 240)" fill="none" stroke="url(#gold)" stroke-width="2.5" opacity="0.2">
    <!-- Balance scale -->
    <line x1="0" y1="0" x2="0" y2="40"/>
    <line x1="-50" y1="8" x2="50" y2="8"/>
    <path d="M-50,8 L-35,35 L-15,35 Z"/>
    <path d="M50,8 L35,35 L15,35 Z"/>
    <circle cx="0" cy="42" r="4" fill="url(#gold)"/>
  </g>

  <!-- Gavel icon (right) -->
  <g transform="translate(1140, 240)" fill="none" stroke="url(#gold)" stroke-width="2.5" opacity="0.2">
    <rect x="-12" y="-30" width="24" height="28" rx="3"/>
    <line x1="0" y1="-2" x2="0" y2="40"/>
    <rect x="-30" y="20" width="60" height="8" rx="2"/>
  </g>

  <!-- Title -->
  <text x="640" y="210" text-anchor="middle" font-family="'Georgia', 'Times New Roman', serif" font-size="72" font-weight="bold" fill="#ffffff" letter-spacing="2">
