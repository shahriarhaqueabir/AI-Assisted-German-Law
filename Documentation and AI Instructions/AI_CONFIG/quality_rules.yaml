# German Law Vault - AI Quality Rules Configuration
# Version: 1.0
# Last Updated: 2026-02-25

# =============================================================================
# Quality System Overview
# =============================================================================
quality:
  enabled: true
  version: "1.0"
  description: "Quality standards and metrics for AI responses"

# =============================================================================
# Q1: Response Quality Standards
# =============================================================================
response_quality:
  # Q1.1: Quality Checklist
  checklist:
    - id: "accuracy"
      name: "Accuracy"
      description: "Information matches current law version"
      weight: 1.0
      verification: "citation_verification"
    
    - id: "citation_integrity"
      name: "Citation Integrity"
      description: "All cited paragraphs exist in retrieved context"
      weight: 1.0
      verification: "context_match"
    
    - id: "version_awareness"
      name: "Version Awareness"
      description: "LAST_UPDATED metadata checked and noted if stale"
      weight: 0.8
      verification: "metadata_check"
    
    - id: "clarity"
      name: "Clarity"
      description: "Understandable by layperson"
      weight: 0.7
      verification: "readability_score"
    
    - id: "completeness"
      name: "Completeness"
      description: "Addresses all parts of query"
      weight: 0.8
      verification: "query_coverage"
    
    - id: "brevity"
      name: "Brevity"
      description: "Concise, no unnecessary verbosity"
      weight: 0.5
      verification: "word_count"
    
    - id: "disclaimer"
      name: "Disclaimer"
      description: "Includes legal disclaimer"
      weight: 1.0
      verification: "disclaimer_present"
    
    - id: "language"
      name: "Language"
      description: "Matches user's language preference"
      weight: 0.8
      verification: "language_detection"
    
    - id: "pii_safety"
      name: "PII Safety"
      description: "No personal data requested or stored"
      weight: 1.0
      verification: "pii_scan"
  
  # Q1.2: Scoring System
  scoring:
    enabled: true
    scale: "0-100"
    
    thresholds:
      excellent: 90
      good: 75
      acceptable: 60
      poor: 40
      unacceptable: 0
    
    # Weights for each quality dimension
    weights:
      accuracy: 0.25
      citation_integrity: 0.20
      version_awareness: 0.10
      clarity: 0.15
      completeness: 0.10
      brevity: 0.05
      disclaimer: 0.10
      language: 0.03
      pii_safety: 0.02
    
    # Minimum passing score
    minimum_passing: 60

# =============================================================================
# Q2: Citation Quality Rules
# =============================================================================
citation_quality:
  # Q2.1: Citation Accuracy
  accuracy:
    required_match: true
    tolerance: 0  # No tolerance for wrong citations
    
    verification_steps:
      - "Extract all citations from response"
      - "Normalize citation format"
      - "Match against context paragraphs"
      - "Flag any unmatched citations"
    
    # Acceptable citation formats
    acceptable_formats:
      - "§548"
      - "BGB §548"
      - "§ 548"
      - "BGB§548"
      - "Section 548"
      - "Paragraph 548"
  
  # Q2.2: Citation Completeness
  completeness:
    # When citations are expected
    expected_in:
      - "law_explanation"
      - "legal_analysis"
      - "paragraph_specific_query"
    
    # When citations are optional
    optional_in:
      - "general_info"
      - "query_translation"
      - "category_browsing"
    
    # Minimum citations for complex queries
    minimum_for_complex: 1
  
  # Q2.3: Citation Formatting
  formatting:
    # Standard format for citations
    standard_format: "{law_code} §{paragraph}"
    
    # Examples
    examples:
      correct:
        - "BGB §548"
        - "StGB §242"
        - "GG Art. 5"
      incorrect:
        - "section 548"  # Should use §
        - "paragraph 548 BGB"  # Wrong order
        - "BGB section 548"  # Mixed format

# =============================================================================
# Q3: Version Quality Rules
# =============================================================================
version_quality:
  # Q3.1: Metadata Completeness
  metadata:
    required_fields:
      - "last_changed"
      - "status"
    
    optional_fields:
      - "repealed_date"
      - "source_url"
      - "xml_version"
    
    # Validation
    validation:
      last_changed:
        format: "ISO8601"
        pattern: "\\d{4}-\\d{2}-\\d{2}"
      
      status:
        allowed_values:
          - "in_force"
          - "amended"
          - "repealed"
      
      repealed_date:
        format: "ISO8601"
        required_if: "status == 'repealed'"
  
  # Q3.2: Warning Triggers
  warnings:
    - condition: "status == 'repealed'"
      warning: "⚠️ This law is no longer in force. It was repealed on {repealed_date}."
      severity: "critical"
    
    - condition: "age_years >= 2"
      warning: "⚠️ This law version is from {date}. Amendments may have occurred. Verify current version."
      severity: "high"
    
    - condition: "age_years >= 1"
      warning: "ℹ️ This law version is from {date}."
      severity: "low"
    
    - condition: "last_changed is missing"
      warning: "ℹ️ Version date not available."
      severity: "low"
  
  # Q3.3: Version Display
  display:
    show_in_response: true
    format: "📅 Last updated: {date}"
    position: "after_explanation"

# =============================================================================
# Q4: Language Quality Rules
# =============================================================================
language_quality:
  # Q4.1: Language Detection Accuracy
  detection:
    method: "keyword_matching"
    confidence_threshold: 0.7
    
    # Minimum keywords for detection
    min_keywords: 3
    
    # Fallback if detection fails
    fallback: "de"  # Default to German
  
  # Q4.2: Response Language Matching
  matching:
    # Match user's language
    match_user: true
    
    # Exceptions
    exceptions:
      - "Legal terms always in German"
      - "Category names bilingual"
  
  # Q4.3: Translation Quality
  translation:
    # False friends must be correct
    false_friends_accuracy: 1.0  # 100% required
    
    # Legal terms must include German original
    include_german_original: true
    
    # Translation review
    review_samples:
      enabled: true
      sample_rate: 0.1  # 10% of translations

# =============================================================================
# Q5: Safety Quality Rules
# =============================================================================
safety_quality:
  # Q5.1: PII Detection Rate
  pii_detection:
    target_rate: 1.0  # 100% detection required
    
    # Pattern accuracy
    pattern_accuracy:
      name: 0.95
      address: 0.90
      case_number: 0.95
      phone: 0.90
      email: 0.98
      date_of_birth: 0.95
    
    # False positive tolerance
    max_false_positive_rate: 0.05
  
  # Q5.2: Disclaimer Compliance
  disclaimer:
    target_rate: 1.0  # 100% compliance required
    
    # Check patterns
    check_patterns:
      - "⚖️"
      - "legal advice"
      - "Rechtsanwalt"
    
    # Position check
    position: "end_of_response"
  
  # Q5.3: Prohibited Content
  prohibited_content:
    zero_tolerance: true
    
    categories:
      - "personal_legal_advice"
      - "court_predictions"
      - "attorney_recommendations"
      - "pii_requests"
      - "emergency_handling"

# =============================================================================
# Q6: Performance Quality Rules
# =============================================================================
performance_quality:
  # Q6.1: Response Time
  response_time:
    target_ms: 5000
    max_ms: 10000
    
    # Percentile targets
    p50_ms: 3000
    p90_ms: 5000
    p99_ms: 8000
  
  # Q6.2: Availability
  availability:
    target_uptime: 0.99  # 99%
    
    # Degraded mode acceptable
    degraded_mode: "search_only"
  
  # Q6.3: Error Rate
  error_rate:
    target: 0.01  # <1% errors
    max: 0.05  # <5% acceptable

# =============================================================================
# Q7: User Experience Quality Rules
# =============================================================================
user_experience:
  # Q7.1: User Satisfaction
  satisfaction:
    target_rate: 0.90  # 90% positive
    
    # Measurement methods
    methods:
      - "thumbs_up_down"
      - "feedback_form"
      - "session_duration"
  
  # Q7.2: Helpfulness
  helpfulness:
    # Response should offer next steps
    offer_next_steps: true
    
    # Related topics suggested
    suggest_related: true
    
    # Clear structure
    clear_structure: true
  
  # Q7.3: Accessibility
  accessibility:
    # Reading level
    max_reading_level: "high_school"
    
    # Clear formatting
    use_paragraphs: true
    use_bullet_points: true
    
    # Visual indicators
    use_emojis: true

# =============================================================================
# Q8: Quality Metrics Dashboard
# =============================================================================
metrics_dashboard:
  # Real-time metrics
  real_time:
    - "current_response_time"
    - "active_sessions"
    - "error_rate_1h"
    - "citation_accuracy_1h"
  
  # Hourly metrics
  hourly:
    - "total_queries"
    - "avg_response_time"
    - "error_count"
    - "guardrail_triggers"
  
  # Daily metrics
  daily:
    - "user_satisfaction"
    - "hallucination_rate"
    - "pii_detection_rate"
    - "version_warning_rate"
    - "false_friend_accuracy"
  
  # Weekly metrics
  weekly:
    - "quality_score_trend"
    - "top_queries"
    - "error_categories"
    - "improvement_suggestions"

# =============================================================================
# Q9: Quality Improvement Loop
# =============================================================================
improvement_loop:
  # Continuous monitoring
  monitoring:
    enabled: true
    interval: "real_time"
  
  # Regular reviews
  reviews:
    - frequency: "daily"
      focus: "error_analysis"
    
    - frequency: "weekly"
      focus: "quality_metrics"
    
    - frequency: "monthly"
      focus: "comprehensive_audit"
  
  # Feedback integration
  feedback:
    sources:
      - "user_ratings"
      - "guardrail_logs"
      - "error_reports"
      - "manual_reviews"
    
    # Action on feedback
    actions:
      - "update_guardrails"
      - "improve_prompts"
      - "retrain_model"
      - "update_documentation"

# =============================================================================
# Q10: Quality Reporting
# =============================================================================
reporting:
  # Automated reports
  automated:
    - name: "daily_quality_summary"
      recipients: ["dev-team"]
      metrics:
        - "total_queries"
        - "error_rate"
        - "avg_quality_score"
    
    - name: "weekly_quality_report"
      recipients: ["dev-team", "management"]
      metrics:
        - "quality_trend"
        - "user_satisfaction"
        - "guardrail_effectiveness"
    
    - name: "monthly_quality_audit"
      recipients: ["dev-team", "management", "stakeholders"]
      metrics:
        - "comprehensive_metrics"
        - "improvement_progress"
        - "recommendations"
  
  # Alert thresholds
  alerts:
    - metric: "error_rate"
      threshold: 0.05
      action: "notify_dev_team"
    
    - metric: "hallucination_rate"
      threshold: 0.01
      action: "notify_dev_team"
    
    - metric: "pii_detection_failure"
      threshold: 1  # Any failure
      action: "critical_alert"

# =============================================================================
# Document Information
# =============================================================================
document:
  version: "1.0"
  last_updated: "2026-02-25"
  maintained_by: "German Law Vault Development Team"
  review_schedule: "Monthly"
