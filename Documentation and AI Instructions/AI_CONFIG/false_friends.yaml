# =============================================================================
# Validation Rules
# =============================================================================
validation:
  # Check all translations against false friends table
  check_on_translation: true
  
  # Severity levels
  severity_levels:
    critical: "Must never be mistranslated"
    high: "Should always be correct"
    medium: "Important to get right"
    low: "Preferred translation"
  
  # Auto-correction
  auto_correct:
    enabled: true
    log_corrections: true
  
  # Warning on potential false friend
  warn_on_detection: true

# =============================================================================
# One-Shot Examples for AI
# =============================================================================
one_shot_examples:
  # Example 1: Besitz vs Eigentum
  - scenario: "possession_vs_ownership"
    query_de: "Ich habe Besitz aber nicht Eigentum"
    query_en: "I have possession but not ownership"
    correct_response_en: |
      You have possession (tatsächliche Sachherrschaft) but not ownership 
      (Rechtstitel) of the apartment. This commonly occurs in rental 
      agreements where the tenant has Besitz and the landlord has Eigentum.
    incorrect_response_en: |
      You have ownership but not possession of the apartment.
  
  # Example 2: Kündigung
  - scenario: "termination_notice"
    query_en: "My landlord issued a Kündigung"
    correct_response_en: |
      Your landlord issued a notice of termination (Kündigung). This is NOT 
      immediate. It requires written form and typically a 3-month notice period.
    incorrect_response_en: |
      Your landlord terminated your lease. You must leave immediately.
  
  # Example 3: Bußgeld vs Strafe
  - scenario: "administrative_vs_criminal"
    query_en: "I got a Bußgeld for speeding"
    correct_response_en: |
      You received an administrative fine (Bußgeld) under OWiG. This is NOT 
      a criminal conviction (Strafe) and does not appear in your criminal record.
    incorrect_response_en: |
      You got a penalty/strafe for speeding. This is a criminal offense.
  
  # Example 4: Gewährleistung vs Garantie
  - scenario: "warranty_vs_guarantee"
    query_en: "Do I have Garantie for this defect?"
    correct_response_en: |
      You likely have Gewährleistung (statutory warranty), which is automatic 
      under BGB §437. This is different from Garantie (voluntary guarantee).
    incorrect_response_en: |
      You have a warranty. Check if the guarantee covers this defect.

