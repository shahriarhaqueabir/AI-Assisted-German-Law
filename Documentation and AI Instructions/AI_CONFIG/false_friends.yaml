# German Law Vault - False Friends Mapping Configuration
# Version: 1.0
# Last Updated: 2026-02-25

# =============================================================================
# False Friends Overview
# =============================================================================
# Critical translation distinctions that must be maintained in all AI responses.
# These terms are frequently mistranslated and have significant legal implications.
# =============================================================================

false_friends:
  enabled: true
  version: "1.0"
  priority: "critical"
  description: "High-stakes legal terminology mappings to prevent mistranslation"

# =============================================================================
# Core False Friends
# =============================================================================
core:
  # Property Law
  - german: "Besitz"
    wrong_translation: "ownership"
    correct_translation: "possession"
    explanation: "Actual physical control of an object, not legal title"
    legal_context: "BGB §854 - Actual control (tatsächliche Sachherrschaft)"
    example_de: "Ich habe Besitz der Sache, aber nicht Eigentum."
    example_en: "I have possession of the item, but not ownership."
    severity: "critical"
  
  - german: "Eigentum"
    wrong_translation: "possession"
    correct_translation: "ownership"
    explanation: "Legal title/right to property, not necessarily physical control"
    legal_context: "BGB §903 - Right to dispose of the thing"
    example_de: "Der Vermieter hat das Eigentum an der Wohnung."
    example_en: "The landlord has ownership of the apartment."
    severity: "critical"
  
  # Employment/Termination
  - german: "Kündigung"
    wrong_translation: "termination"
    correct_translation: "notice of termination"
    explanation: "Requires form and notice period, not instant effect"
    legal_context: "BGB §568 - Written form required"
    example_de: "Der Vermieter hat die Kündigung ausgesprochen."
    example_en: "The landlord issued the notice of termination."
    severity: "critical"
  
  - german: "Frist"
    wrong_translation: "deadline"
    correct_translation: "period/time limit"
    explanation: "Can be weeks/months, not just a specific date"
    legal_context: "BGB §187-193 - Time period calculations"
    example_de: "Die Kündigungsfrist beträgt drei Monate."
    example_en: "The notice period is three months."
    severity: "high"
  
  # Legal Claims
  - german: "Anspruch"
    wrong_translation: "claim (lawsuit)"
    correct_translation: "entitlement/right"
    explanation: "Legal right to demand something, not necessarily a lawsuit"
    legal_context: "BGB §194 - Right to demand"
    example_de: "Ich habe einen Anspruch auf Rückzahlung."
    example_en: "I have an entitlement to repayment."
    severity: "critical"
  
  - german: "Forderung"
    wrong_translation: "demand"
    correct_translation: "claim/debt"
    explanation: "Creditor's right to payment, not an aggressive demand"
    legal_context: "BGB §241 - Creditor's right"
    example_de: "Die Forderung beträgt 500 Euro."
    example_en: "The claim/debt is 500 euros."
    severity: "high"
  
  # Court Decisions
  - german: "Urteil"
    wrong_translation: "verdict"
    correct_translation: "judgment"
