# German Law Vault - AI Guardrails Configuration
# Version: 1.0
# Last Updated: 2026-02-25

# =============================================================================
# Guardrail System Overview
# =============================================================================
guardrails:
  enabled: true
  version: "1.0"
  description: "Safety and quality controls for AI responses"

# =============================================================================
# G1: Legal Disclaimer Guardrails
# =============================================================================
legal_disclaimer:
  # G1.1: Mandatory Disclaimer Injection
  mandatory_injection:
    enabled: true
    check_pattern: "⚖️|legal advice|Rechtsanwalt"
    
    responses:
      short: "⚖️ This information does not constitute legal advice."
      full: "⚖️ This information does not constitute legal advice. Consult a qualified German attorney (Rechtsanwalt) for your specific case."
    
    triggers:
      law_explanation: "full"
      query_translation: "short"
      legal_analysis: "full"
      search_results: "short"
      general_info: "short"
  
  # G1.2: Uncertainty Language
  uncertainty_language:
    enabled: true
    
    prohibited_phrases:
      - "will"  # in predictions
      - "must"  # for outcomes
      - "guaranteed"
      - "certain"
      - "definitely"
      - "without doubt"
      - "always"
      - "never"
    
    required_phrases:
      - "may"
      - "could"
      - "typically"
      - "generally"
      - "in many cases"
      - "often"
      - "usually"
      - "commonly"
    
    examples:
      wrong: "The court will rule in your favor."
      correct: "The court may consider these factors in its decision."
  
  # G1.3: Professional Referral
  professional_referral:
    enabled: true
    
    triggers:
      - category: "criminal"
        law_codes: ["StGB"]
        keywords: ["strafe", "straftat", "angeklagter"]
      
      - category: "court_proceedings"
        keywords: ["gericht", "klage", "verhandlung", "urteil"]
      
      - category: "high_value_dispute"
        threshold_euros: 5000
        keywords: ["schadensersatz", "forderung"]
      
      - category: "family_law"
        keywords: ["scheidung", "sorgerecht", "unterhalt"]
      
      - category: "employment_termination"
        keywords: ["kündigung", "fristlos", "abmahnung"]
      
      - category: "immigration"
        keywords: ["asyl", "aufenthalt", "einbürgerung"]
    
    response_template: |
      ⚠️ Your situation may require professional legal assistance.
      
      Consider consulting:
      - A qualified German attorney (Rechtsanwalt)
      - Local legal aid (Beratungshilfe)
      - Consumer protection centers (Verbraucherzentrale)
      
      Find a lawyer: https://www.brav.de/ (German Bar Association)
      
      ⚖️ This information does not constitute legal advice.

# =============================================================================
# G2: Content Restrictions
# =============================================================================
content_restrictions:
  # G2.1: Prohibited Advice Categories
  prohibited_categories:
    - category: "tax_evasion"
      keywords: ["steuerhinterziehung", "tax evasion", "steuern umgehen"]
      response: "I cannot provide information on tax avoidance strategies. Tax advice requires a qualified tax advisor (Steuerberater)."
      resource: "https://www.steuerberater.de/"
    
    - category: "immigration_loopholes"
      keywords: ["aufenthalt umgehen", "immigration loophole", "abschiebung verhindern"]
      response: "Immigration law is complex. Consult an immigration attorney for legal options."
      resource: "https://www.bamf.de/"
    
    - category: "criminal_defense_tactics"
      keywords: ["strafverteidigung taktik", "criminal defense tactic", "strafe umgehen"]
      response: "Criminal matters require attorney representation. Contact a criminal defense lawyer."
      resource: "https://www.strafverteidiger.de/"
    
    - category: "loophole_exploitation"
      keywords: ["lücke ausnutzen", "loophole", "umgehen"]
      response: "I provide legal information, not exploitation strategies."
  
  # G2.2: Prohibited Actions
  prohibited_actions:
    - action: "recommend_lawyer"
      pattern: "recommend.*lawyer|empfehle.*anwalt|suggest.*attorney"
      response: "I cannot recommend specific attorneys. Use the German Bar Association finder."
      resource: "https://www.brav.de/"
    
    - action: "predict_outcome"
      pattern: "will.*win|will.*lose|werden.*gewinnen|werden.*verlieren"
      response: "I cannot predict court decisions. Outcomes depend on many factors."
    
    - action: "definitive_interpretation"
      pattern: "definitely.*means|eindeutig.*bedeutet|clearly.*means"
      response: "This law has multiple interpretations. A lawyer can advise on your specific case."
    
    - action: "emergency_handling"
      pattern: "emergency|urgent|sofort|dringend|eilig"
      response: "For urgent legal matters, contact an attorney immediately or seek legal aid."
    
    - action: "pii_processing"
      pattern: "name|address|phone|email|case.*number"
      response: "Please do not share personal information. Describe your situation generally."
  
  # G2.3: Redirection Protocol
  redirection:
    enabled: true
    
    mapping:
      lawyer_recommendation:
        message: "I cannot recommend specific attorneys."
        resource: "https://www.brav.de/"
        resource_name: "German Bar Association Finder"
      
      court_prediction:
        message: "I cannot predict court outcomes."
        resource: "https://www.gesetze-im-internet.de/"
        resource_name: "Official Law Database"
      
      emergency:
        message: "For urgent matters, seek immediate legal assistance."
        resource: "https://www.anwalt.de/"
        resource_name: "Attorney Directory"
      
      tax_advice:
        message: "Tax advice requires a qualified tax advisor (Steuerberater)."
        resource: "https://www.steuerberater.de/"
        resource_name: "Tax Advisor Directory"

# =============================================================================
# G3: Data Privacy Guardrails
# =============================================================================
data_privacy:
  # G3.1: PII Detection
  pii_detection:
    enabled: true
    
    patterns:
      name:
        regex: "\\b[A-Z][a-z]+(?:\\s+[A-Z][a-z]+)+\\b"
        description: "Capitalized names (Hans Müller)"
        confidence_threshold: 0.7
      
      address:
        regex: "\\b\\d{5}\\s+.+\\b"
        description: "ZIP + street (10115 Berlin)"
        confidence_threshold: 0.8
      
      case_number:
        regex: "\\b[A-Z]{1,3}\\s*\\d+\\s*/\\s*\\d+\\b"
        description: "Case number (AZ: 123/456)"
        confidence_threshold: 0.9
      
      phone:
        regex: "\\b\\d{3,4}[/\\s]?\\d{3,}[/\\s]?\\d{2,4}\\b"
        description: "Phone numbers"
        confidence_threshold: 0.8
      
      email:
        regex: "\\b[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\\.[A-Z|a-z]{2,}\\b"
        description: "Email addresses"
        confidence_threshold: 0.95
      
      date_of_birth:
        regex: "\\b\\d{1,2}\\.\\d{1,2}\\.\\d{4}\\b"
        description: "Date of birth (DD.MM.YYYY)"
        confidence_threshold: 0.85
    
    # Response when PII detected
    response_template: |
      ⚠️ PRIVACY NOTICE
      
      We detected personal information in your message: {detected_types}
      
      For your protection, please avoid sharing:
      - Names (your name, other parties)
      - Addresses or locations
      - Case numbers or file references
      - Dates of birth or personal identifiers
      
      You can describe your situation generally without these details.
      Example:
      ✅ "My rental agreement was terminated"
      ❌ "My landlord Hans Müller at Berliner Str. 123 terminated my lease"
      
      Would you like to rephrase your question?
      
      ⚖️ This information does not constitute legal advice.
  
  # G3.2: PII Redaction in Logs
  pii_redaction:
    enabled: true
    
    redaction_map:
      name: "[NAME]"
      address: "[ADDRESS]"
      case_number: "[CASE_NUMBER]"
      phone: "[PHONE]"
      email: "[EMAIL]"
      date_of_birth: "[DATE_OF_BIRTH]"
    
    # Apply before logging
    apply_before_logging: true
  
  # G3.3: Data Retention Limits
  data_retention:
    user_queries: "session_only"
    search_history: "30_minutes"
    ai_responses: "session_only"
    logs_redacted: "7_days"
    analytics_aggregated: "90_days"
    
    # Automatic cleanup
    cleanup_interval: "5_minutes"
    session_timeout: "30_minutes"

# =============================================================================
# G4: Citation Integrity Guardrails
# =============================================================================
citation_integrity:
  # G4.1: Source-Bound Citations
  source_bound:
    enabled: true
    description: "Only cite paragraphs explicitly provided in retrieval context"
  
  # G4.2: Citation Verification
  verification:
    enabled: true
    
    # Citation pattern matching
    citation_patterns:
      - pattern: "§\\s*(\\d+[a-z]*)"
        description: "Simple paragraph (§548)"
      
      - pattern: "(BGB|StGB|GG|StPO|ZPO|VwVfG)\\s*§\\s*(\\d+[a-z]*)"
        description: "Law code with paragraph (BGB §548)"
      
      - pattern: "Artikel?\\s*(\\d+)"
        description: "Article (Art. 5 GG)"
    
    # Verification function
    verify_function: "verify_citation(cited_paragraph, context)"
    
    # Sanitization
    sanitization:
      enabled: true
      replacement: "[paragraph not found in database]"
      log_removed: true
  
  # G4.3: Hallucination Prevention
  hallucination_prevention:
    enabled: true
    
    # Pre-response verification
    pre_response_check: true
    
    # Post-response logging
    post_response_logging: true
    
    # Warning thresholds
    warnings:
      single_hallucination: "warning"
      multiple_hallucinations: "block_response"
  
  # G4.4: Fallback Responses
  fallback_responses:
    no_context:
      template: "No specific laws were found in the database for this query. Try searching for: {keywords}"
    
    missing_law:
      template: "The database doesn't contain that specific provision. Related topics found: {list}"
    
    citation_not_verified:
      template: "I found information about this topic, but the specific paragraph wasn't in the retrieved results."
    
    empty_results:
      template: "No laws matched your search. Try using German legal terms or browse by category."
  
  # G4.5: Confidence Markers
  confidence_markers:
    enabled: true
    
    levels:
      high:
        condition: "all_citations_verified"
        message: ""
      
      medium:
        condition: "some_citations_not_verified"
        message: "⚠️ Some cited provisions were not found in the retrieved results."
      
      low:
        condition: "no_citations_verified"
        message: "⚠️ Specific provisions could not be verified in the database."
      
      general:
        condition: "no_specific_citations"
        message: "ℹ️ This is general legal information, not tied to specific paragraphs."

# =============================================================================
# G5: Enforcement Mechanisms
# =============================================================================
enforcement:
  # G5.1: Pre-Response Validation
  pre_response_validation:
    enabled: true
    
    validation_pipeline:
      - step: 1
        name: "pii_check"
        action: "detect_pii"
        on_failure: "warn_and_redact"
      
      - step: 2
        name: "citation_verification"
        action: "verify_citations"
        on_failure: "remove_and_warn"
      
      - step: 3
        name: "disclaimer_check"
        action: "check_disclaimer"
        on_failure: "inject_disclaimer"
      
      - step: 4
        name: "prohibited_content"
        action: "check_prohibited"
        on_failure: "block_response"
    
    # Validation result structure
    result_structure:
      valid: "boolean"
      sanitized_response: "string"
      warnings: "list[string]"
      errors: "list[string]"
      disclaimer_injected: "boolean"
  
  # G5.2: Rate Limiting
  rate_limiting:
    enabled: true
    
    limits:
      law_explanation:
        max_calls: 10
        per_seconds: 60
      
      legal_analysis:
        max_calls: 5
        per_seconds: 60
      
      translation:
        max_calls: 20
        per_seconds: 60
    
    # Response on limit exceeded
    response_template: |
      ⚠️ AI Feature Rate Limited
      
      You've reached the limit for AI features ({limit} requests per minute).
      
      Please wait {retry_after} seconds before trying again.
      
      You can still:
      - Browse search results manually
      - Use keyword search
      - Browse by category
      
      ⚖️ This information does not constitute legal advice.
  
  # G5.3: Error Handling
  error_handling:
    graceful_degradation: true
    
    scenarios:
      ai_unavailable:
        action: "show_search_results_only"
      
      citation_verification_fails:
        action: "remove_citations_add_warning"
      
      pii_detection_error:
        action: "show_generic_privacy_warning"
      
      disclaimer_injection_fails:
        action: "prepend_warning_to_response"
      
      timeout:
        action: "show_timeout_message"
  
  # G5.4: Audit Logging
  audit_logging:
    enabled: true
    
    log_format:
      timestamp: "ISO8601"
      session_id: "string"
      guardrail_triggered: "string"
      action_taken: "string"
      details: "object"
      user_query_hash: "sha256"
    
    # Log retention
    retention_days: 7
    
    # Log storage
    storage: "secure_logs"

# =============================================================================
# Compliance Checklist
# =============================================================================
compliance_checklist:
  pre_deployment:
    - "Disclaimer injection implemented"
    - "PII detection active"
    - "Citation verification enabled"
    - "Rate limiting configured"
    - "Error handling in place"
    - "Audit logging active"
    - "Fallback responses defined"
    - "Prohibited content filtering enabled"
  
  periodic_review:
    - "Review guardrail effectiveness"
    - "Update PII patterns"
    - "Check citation accuracy"
    - "Verify rate limits appropriate"
    - "Test error scenarios"
    - "Audit log analysis"

# =============================================================================
# Document Information
# =============================================================================
document:
  version: "1.0"
  last_updated: "2026-02-25"
  maintained_by: "German Law Vault Development Team"
  review_schedule: "Monthly"
