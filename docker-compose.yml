version: "3.9"

services:
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped

  broker:
    build: ./broker
    ports:
      - "9000:9000"
    environment:
      - OLLAMA_URL=http://ollama:11434
      - OLLAMA_MODEL=qwen2.5:1.5b
      - CORS_ORIGIN=${CORS_ORIGIN:-}
    depends_on:
      - ollama
    restart: unless-stopped

volumes:
  ollama_data:
