# Dependabot configuration for German Law Vault
# See https://docs.github.com/en/code-security/dependabot

version: 2
updates:
  # npm dependencies (Next.js app)
  - package-ecosystem: "npm"
    directory: "/nextjs"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Europe/Berlin"
    open-pull-requests-limit: 10
    versioning-strategy: increase
    labels:
      - "dependencies"
      - "npm"
    reviewers:
      - "shahriarhaqueabir"
    commit-message:
      prefix: "deps"
      prefix-development: "deps(dev)"
    groups:
      react:
        patterns:
          - "react"
          - "react-dom"
          - "@types/react"
          - "@types/react-dom"
        update-types:
          - "minor"
          - "patch"
      supabase:
        patterns:
          - "@supabase/*"
        update-types:
          - "minor"
          - "patch"
      qdrant:
        patterns:
          - "@qdrant/*"
        update-types:
          - "minor"
          - "patch"
      typescript-eslint:
        patterns:
          - "@typescript-eslint/*"
          - "typescript"
        update-types:
          - "minor"
          - "patch"
      testing:
        patterns:
          - "vitest"
          - "@vitest/*"
        update-types:
          - "minor"
          - "patch"
    ignore:
      # Next.js major versions need manual migration review
      - dependency-name: "next"
        update-types:
          - "version-update:semver-major"
      # Zod 3.x may need migration from Zod 4.x
      - dependency-name: "zod"
        update-types:
          - "version-update:semver-major"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Europe/Berlin"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "github-actions"
    reviewers:
      - "shahriarhaqueabir"
    commit-message:
      prefix: "ci"
    groups:
      actions:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
